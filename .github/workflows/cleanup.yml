name: Clean Notebooks
on:
  pull_request_review:
    types: [submitted]
  workflow_dispatch:

jobs:
  fix:
    if: github.event.review.state == 'approved'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
      - name: Install Dependencies
        run: |
          python -m pip install nb_helpers
      - name: Clean up .ipynb files
        run: |
          nb_helpers.fix_nbs ./colabs/
      - name: Commit and push if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Bind the untrusted PR head ref to an env var so the shell never sees the raw
          # ${{ }} expansion. A malicious branch name (e.g. containing $(...) or ;) is then
          # treated as literal data by the quoted "$HEAD_REF" below, not executed. (CWE-78)
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-clean notebooks"
            git push origin "HEAD:$HEAD_REF"
          fi